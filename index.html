<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOD - Знакомства</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --input-bg: #1a1a1a;
            --text-color: #ffffff;
            --text-muted: #7a7a7a;
            --accent-gold: #e5a93b;
            --error-color: #ff4d4d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 25px;
            padding: 0 10px;
            line-height: 1.4;
        }

        .step-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-color);
            padding: 14px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        /* Стиль фокуса для даты рождения и остальных полей */
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(229, 169, 59, 0.2);
        }

        /* Ошибка валидации */
        input.error-border {
            border-color: var(--error-color) !important;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 2px;
            display: none;
        }

        /* Выбор пола кнопками */
        .gender-container {
            display: flex;
            gap: 12px;
        }

        .gender-btn {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-muted);
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .gender-btn.active {
            border-color: var(--accent-gold);
            color: var(--text-color);
            background-color: rgba(229, 169, 59, 0.05);
        }

        /* Стилизация выпадающего списка Метро с цветами веток */
        .metro-option-red { border-left: 4px solid #ef161e; padding-left: 6px; }
        .metro-option-green { border-left: 4px solid #2db440; padding-left: 6px; }
        .metro-option-blue { border-left: 4px solid #0078bf; padding-left: 6px; }

        /* Кнопка продолжить */
        .btn-submit {
            background-color: #ffffff;
            border: none;
            border-radius: 25px;
            color: #000000;
            font-size: 16px;
            font-weight: 600;
            padding: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }

        .btn-submit:active {
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="step1" class="step-container">
        <h2>Создать профиль</h2>
        <div class="subtitle">Заполните обязательные* поля</div>

        <div class="input-group">
            <label>Имя*</label>
            <input type="text" id="name" placeholder="Ваше имя">
            <div id="name-error" class="error-message"></div>
        </div>

        <div class="input-group">
            <label>Дата рождения*</label>
            <input type="date" id="birthdate">
        </div>

        <div class="input-group">
            <label>Город*</label>
            <select id="city">
                <option value="Москва">Москва</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
            </select>
        </div>

        <div class="input-group">
            <label>Станция метро*</label>
            <select id="metro">
                <option value="" disabled selected>Выберите станцию</option>
                <option value="Сокольники" class="metro-option-red">Сокольники (Сокольническая)</option>
                <option value="Охотный Ряд" class="metro-option-red">Охотный Ряд (Сокольническая)</option>
                <option value="Парк Культуры" class="metro-option-red">Парк Культуры (Сокольническая)</option>
                <option value="Тверская" class="metro-option-green">Тверская (Замоскворецкая)</option>
                <option value="Маяковская" class="metro-option-green">Маяковская (Замоскворецкая)</option>
                <option value="Павелецкая" class="metro-option-green">Павелецкая (Замоскворецкая)</option>
                <option value="Арбатская" class="metro-option-blue">Арбатская (Арбатско-Покровская)</option>
                <option value="Смоленская" class="metro-option-blue">Смоленская (Арбатско-Покровская)</option>
                <option value="Бауманская" class="metro-option-blue">Бауманская (Арбатско-Покровская)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Пол*</label>
            <div class="gender-container">
                <div class="gender-btn" id="gender-male" onclick="setGender('Мужской')">Мужской</div>
                <div class="gender-btn" id="gender-female" onclick="setGender('Женский')">Женский</div>
            </div>
        </div>

        <button class="btn-submit" onclick="nextStep()">Продолжить</button>
    </div>


    <div id="step2" class="step-container hidden">
        <h2>Дополнительно</h2>
        <div class="subtitle">Добавь деталей, чтобы анкета выглядела круче и быстрее привлекла внимание!</div>

        <div class="input-group">
            <label>Описание</label>
            <textarea id="description" rows="3" placeholder="Несколько интересных фактов о себе..."></textarea>
        </div>

        <div class="input-group">
            <label>Я хочу</label>
            <select id="purpose">
                <option value="" disabled selected>Укажите цель</option>
                <option value="Серьезные отношения">Серьезные отношения</option>
                <option value="Флирт / Секс на одну ночь">Флирт / Секс на одну ночь</option>
                <option value="Регулярный секс">Регулярный sex</option>
                <option value="Прогулки / Общение">Прогулки / Общение</option>
                <option value="Посмотрим, куда зайдет">Посмотрим, куда зайдет</option>
            </select>
        </div>

        <div class="input-group">
            <label>Деятельность</label>
            <input type="text" id="activity" placeholder="Чем вы занимаетесь?">
        </div>

        <div class="input-group">
            <label>Рост (см)</label>
            <select id="height"></select>
        </div>

        <div class="input-group">
            <label>Социальные сети</label>
            <input type="text" id="instagram" placeholder="Ник в Instagram" style="margin-bottom: 8px;">
            <input type="text" id="vk" placeholder="Ссылка или ник в VK">
        </div>

        <button class="btn-submit" onclick="submitForm()">Готово</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем Web App на весь экран

        let selectedGender = "";

        // Генерация списка роста от 140 до 220 см
        const heightSelect = document.getElementById('height');
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.text = "Выберите рост";
        defaultOption.disabled = true;
        defaultOption.selected = true;
        heightSelect.appendChild(defaultOption);

        for (let i = 140; i <= 220; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i + " см";
            heightSelect.appendChild(opt);
        }

        // Выбор пола
        function setGender(gender) {
            selectedGender = gender;
            document.getElementById('gender-male').classList.remove('active');
            document.getElementById('gender-female').classList.remove('active');
            
            if (gender === 'Мужской') {
                document.getElementById('gender-male').classList.add('active');
            } else {
                document.getElementById('gender-female').classList.add('active');
            }
        }

        // Переход на Шаг 2 с валидацией имени
        function nextStep() {
            const nameInput = document.getElementById('name');
            const nameError = document.getElementById('name-error');
            const nameValue = nameInput.value.trim();

            // Сброс ошибок
            nameInput.classList.remove('error-border');
            nameError.style.display = 'none';

            // Валидация на пустоту
            if (!nameValue) {
                nameInput.classList.add('error-border');
                nameError.innerText = "Поле имя обязательно для заполнения";
                nameError.style.display = 'block';
                return;
            }

            // Валидация на цифры
            if (/\d/.test(nameValue)) {
                nameInput.classList.add('error-border');
                nameError.innerText = "Цифры вводить нельзя";
                nameError.style.display = 'block';
                return;
            }

            // Переключение экранов
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        // Сбор всех данных и отправка в бот
        function submitForm() {
            const data = {
                name: document.getElementById('name').value.trim(),
                birthdate: document.getElementById('birthdate').value,
                city: document.getElementById('city').value,
                metro: document.getElementById('metro').value,
                gender: selectedGender,
                description: document.getElementById('description').value.trim(),
                purpose: document.getElementById('purpose').value,
                activity: document.getElementById('activity').value.trim(),
                height: document.getElementById('height').value,
                instagram: document.getElementById('instagram').value.trim(),
                vk: document.getElementById('vk').value.trim()
            };

            // Отправляем JSON строку обратно в Python бот
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
