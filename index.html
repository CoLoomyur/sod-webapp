<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOD - Создать профиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121417;
            --border: #1c1f24;
            --text: #ffffff;
            --text-muted: #6c7278;
            --error: #ff453a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            width: 100%;
        }

        .screen.active {
            display: block;
        }

        h2 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0 6px 0;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 25px;
        }

        /* Оформление полей ввода по референсу */
        .input-wrapper {
            margin-bottom: 18px;
            width: 100%;
        }

        .label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            padding-left: 2px;
        }

        .input-box {
            width: 100%;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            box-sizing: border-box;
            color: var(--text);
            font-size: 16px;
            outline: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .input-box input, .input-box textarea {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 16px;
            outline: none;
            width: 100%;
            padding: 0;
        }

        .input-box input::placeholder, .input-box textarea::placeholder {
            color: #4a4f54;
        }

        .input-box textarea {
            resize: none;
            height: 70px;
            font-family: inherit;
        }

        .input-box .val-right {
            text-align: right;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            width: 60%;
        }

        .input-box.error-border {
            border-color: var(--error) !important;
        }

        .error-msg {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            padding-left: 4px;
            display: none;
        }

        /* Выбор режима и пола (Кнопки) */
        .mode-container {
            display: flex;
            gap: 12px;
            margin-bottom: 4px;
        }

        .mode-btn, .gender-btn, .social-toggle-btn {
            flex: 1;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            color: var(--text);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn .circle, .gender-btn .circle {
            width: 16px;
            height: 16px;
            border: 2px solid #4a4f54;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .mode-btn#sex-btn.active { border-color: #ff0055; color: #ff0055; }
        .mode-btn#sex-btn.active .circle { border-color: #ff0055; background-color: #ff0055; }
        .mode-btn#date-btn.active { border-color: #0088ff; color: #0088ff; }
        .mode-btn#date-btn.active .circle { border-color: #0088ff; background-color: #0088ff; }
        
        .gender-btn.active { border-color: var(--text); }
        .gender-btn.active .circle { border-color: var(--text); background-color: var(--text); }
        .social-toggle-btn.active { border-color: var(--text); background-color: #1c1f24; }

        .submit-btn {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 28px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        
        /* Полноэкранные оверлеи */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000;
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
        }

        .overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .close-overlay {
            font-size: 15px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .search-box {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
        }

        .list-item {
            padding: 16px;
            border-bottom: 1px solid #121417;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-item:active { background-color: var(--card); }
        
        /* Цвета веток метро */
        .metro-badge { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .metro-section { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-top: 15px; margin-bottom: 5px; font-weight: bold; padding-left: 4px; }

        /* Нативная iOS-крутилка роста */
        .picker-top-bar {
            display: flex;
            justify-content: space-between;
            background-color: var(--card);
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0 25px 0;
            font-weight: bold;
        }

        .wheel-outer-wrapper { position: relative; width: 100%; margin: auto 0; }
        .wheel-container {
            height: 250px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .wheel-container::-webkit-scrollbar { display: none; }
        .wheel-scroller { padding: 100px 0; }
        .wheel-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #4a4f54;
            font-weight: bold;
            scroll-snap-align: center;
            transition: all 0.2s ease;
            transform: scale(0.88);
        }
        .wheel-item.selected {
            color: var(--text);
            font-size: 26px;
            font-weight: 800;
            transform: scale(1.1);
        }
        .wheel-mask {
            position: absolute;
            top: 100px; left: 0; width: 100%; height: 50px;
            pointer-events: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

            <div class="error-msg" id="name-error">Поле обязательное</div>
        </div>
