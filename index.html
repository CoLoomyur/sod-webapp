<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOD Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --error: #ff453a; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        
        /* Стили полей как на фото */
        .input-wrapper { margin-bottom: 20px; }
        .label { font-size: 14px; margin-bottom: 8px; color: #aaa; }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; background: var(--card); border: 1px solid #333; color: var(--text); font-size: 16px; box-sizing: border-box; }
        .error-msg { color: var(--error); font-size: 12px; margin-top: 5px; display: none; }
        
        .submit-btn { width: 100%; padding: 16px; background: #fff; color: #000; border-radius: 12px; font-weight: bold; border: none; margin-top: 30px; }

        /* Крутилка роста */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display:none; flex-direction:column; z-index:100; }
        .wheel-container { height: 200px; overflow: scroll; scroll-snap-type: y mandatory; text-align: center; margin: auto; }
        .wheel-item { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #444; scroll-snap-align: center; }
        .wheel-item.selected { color: #fff; font-size: 26px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="input-wrapper">
        <div class="label">Имя*</div>
        <input type="text" id="name" class="input-box" placeholder="Введите имя">
        <div id="name-error" class="error-msg">Поле обязательное</div>
    </div>
    
    <div class="input-wrapper" onclick="document.getElementById('height-overlay').style.display='flex'">
        <div class="label">Рост</div>
        <div class="input-box" id="height-display">Выберите рост...</div>
    </div>

    <button class="submit-btn" onclick="validate()">Продолжить</button>
</div>

<div id="height-overlay" class="overlay">
    <div class="wheel-container" id="wheel" onscroll="onScroll()">
        <div id="wheel-inner"></div>
    </div>
    <div style="padding:20px"><button class="submit-btn" onclick="saveH()">Готово</button></div>
</div>

<script>
    const inner = document.getElementById('wheel-inner');
    for(let i=140; i<=210; i++) inner.innerHTML += `<div class="wheel-item" id="h-${i}">${i} см</div>`;
    
    function onScroll() {
        let val = Math.round(document.getElementById('wheel').scrollTop/50) + 140;
        document.querySelectorAll('.wheel-item').forEach(el=>el.classList.remove('selected'));
        document.getElementById(`h-${val}`)?.classList.add('selected');
        window.tempH = val;
    }
    
    function saveH() {
        document.getElementById('height-display').innerText = window.tempH + " см";
        document.getElementById('height-overlay').style.display = 'none';
    }

    function validate() {
        if(!document.getElementById('name').value) {
            document.getElementById('name-error').style.display = 'block';
            document.getElementById('name').style.borderColor = 'var(--error)';
        } else {
            alert('Данные отправлены!');
        }
    }
</script>
</body>
</html>
