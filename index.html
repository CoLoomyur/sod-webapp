<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #08090a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .neon-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 120px 50px rgba(255, 255, 255, 0);
            z-index: -1;
            transition: box-shadow 0.6s ease, background 0.6s ease;
        }
        .container {
            width: 100%;
            max-width: 360px;
            margin-top: 40px;
        }
        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6c7278;
            margin-bottom: 8px;
            display: block;
        }
        .input-field {
            width: 100%;
            background-color: #121417;
            border: 1px solid #22252a;
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 28px;
            outline: none;
        }
        .mode-container {
            display: flex;
            gap: 14px;
            margin-bottom: 40px;
        }
        .mode-btn {
            flex: 1;
            background-color: #121417;
            border: 1px solid #22252a;
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s ease;
        }
        .mode-btn#sex-btn.active {
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
            background-color: rgba(255, 0, 85, 0.05);
        }
        .mode-btn#date-btn.active {
            border-color: #0088ff;
            color: #0088ff;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
            background-color: rgba(0, 136, 255, 0.05);
        }
        .submit-btn {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 30px;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="neon-glow" id="glow"></div>

<div class="container">
    <label>Ваше имя</label>
    <input type="text" id="name" class="input-field" placeholder="Имя или никнейм...">

    <label>Возраст</label>
    <input type="number" id="age" class="input-field" placeholder="Сколько вам лет?">

    <label>Что вы ищете? *</label>
    <div class="mode-container">
        <div class="mode-btn" id="sex-btn" onclick="selectMode('Sex')">SEX</div>
        <div class="mode-btn" id="date-btn" onclick="selectMode('Date')">DATE</div>
    </div>

    <button class="submit-btn" onclick="sendDataToBot()">Создать аккаунт</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentMode = "";

    function selectMode(mode) {
        currentMode = mode;
        const glow = document.getElementById('glow');
        const sexBtn = document.getElementById('sex-btn');
        const dateBtn = document.getElementById('date-btn');

        sexBtn.classList.remove('active');
        dateBtn.classList.remove('active');

        if (mode === 'Sex') {
            sexBtn.classList.add('active');
            glow.style.boxShadow = "0 0 150px 70px rgba(255, 0, 85, 0.15)";
            glow.style.background = "rgba(255, 0, 85, 0.05)";
        } else if (mode === 'Date') {
            dateBtn.classList.add('active');
            glow.style.boxShadow = "0 0 150px 70px rgba(0, 136, 255, 0.15)";
            glow.style.background = "rgba(0, 136, 255, 0.05)";
        }
    }

    function sendDataToBot() {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;

        if (!name || !age || !currentMode) {
            alert("Заполните все поля");
            return;
        }

        const data = { name: name, age: int(age), purpose: currentMode };
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>
</body>
</html>
